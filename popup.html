<!doctype html>
<html lang="en">

<head>
 <meta charset="utf-8">
 <title>TrueMoji</title>
 <link rel="stylesheet" href="theme.css">
 <style>
 body { width: 360px; font-size: 13.5px; }
 .wrap { padding: 14px 14px 12px; }

 header {
 display: flex;
 align-items: center;
 justify-content: space-between;
 gap: 10px;
 margin-bottom: 14px;
 }
 .brand { display: flex; align-items: center; gap: 10px; }
 .brand-logo {
 width: 38px; height: 38px;
 border-radius: 12px;
 background: var(--gradient-sun);
 display: flex; align-items: center; justify-content: center;
 box-shadow: var(--shadow-glow);
 flex-shrink: 0;
 }
 .brand-logo img { width: 30px; height: 30px; }
 .brand-text h1 {
 font-size: 16px;
 font-weight: 800;
 letter-spacing: -0.02em;
 margin: 0;
 line-height: 1.1;
 color: var(--fg);
 }
 .brand-text .ver {
 font-size: 10px;
 font-weight: 700;
 color: var(--muted);
 letter-spacing: 0.06em;
 text-transform: uppercase;
 }
 .head-actions { display: flex; gap: 4px; align-items: center; }

 .master {
 display: flex;
 align-items: center;
 justify-content: space-between;
 padding: 12px 14px;
 background: var(--card);
 border: 1px solid var(--border);
 border-radius: var(--radius-lg);
 margin-bottom: 12px;
 gap: 12px;
 box-shadow: var(--shadow-sm);
 }
 .master.is-on {
 background: linear-gradient(135deg, rgba(255,184,0,0.10) 0%, rgba(255,149,0,0.06) 100%);
 border-color: var(--brand-300);
 }
 .master-title { font-weight: 700; font-size: 14px; }
 .master-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

 .preview-card {
 padding: 14px;
 background: var(--card);
 border: 1px solid var(--border);
 border-radius: var(--radius-lg);
 margin-bottom: 12px;
 box-shadow: var(--shadow-sm);
 }
 .preview-head {
 display: flex; align-items: center; justify-content: space-between;
 margin-bottom: 10px;
 }
 .preview-label {
 font-size: 11px; font-weight: 700;
 text-transform: uppercase; letter-spacing: 0.08em;
 color: var(--muted);
 }
 .preview-pack-pill {
 display: inline-flex; align-items: center; gap: 4px;
 padding: 2px 9px;
 border-radius: var(--radius-pill);
 background: var(--accent-soft);
 color: var(--accent);
 font-size: 11px; font-weight: 700;
 letter-spacing: 0.02em;
 }
 .preview-text {
 font-size: 16px;
 line-height: 1.5;
 color: var(--fg);
 min-height: 28px;
 word-break: break-word;
 text-align: start;
 }
 html[dir="rtl"] .preview-text { direction: rtl; text-align: right; }
 .preview-text img {
 width: auto;
 height: 1.2em;
 vertical-align: -0.2em;
 margin: 0 1px;
 object-fit: contain;
 }

 .pack-section { margin-bottom: 12px; }
 .pack-section-head {
 display: flex; align-items: center; justify-content: space-between;
 margin-bottom: 8px;
 }
 .pack-section-title {
 font-size: 11px; font-weight: 700;
 text-transform: uppercase; letter-spacing: 0.08em;
 color: var(--muted);
 }
 .pack-count {
 font-size: 10.5px; color: var(--muted);
 }

 .packs {
 display: grid;
 grid-template-columns: repeat(2, 1fr);
 gap: 8px;
 }
 .pack {
 position: relative;
 display: flex;
 align-items: center;
 gap: 8px;
 padding: 8px 10px;
 border-radius: var(--radius-md);
 border: 1.5px solid var(--border);
 background: var(--bg-elevated);
 cursor: pointer;
 transition: all 0.18s ease;
 font-family: inherit;
 color: var(--fg);
 text-align: start;
 overflow: hidden;
 }
 .pack:hover {
 border-color: var(--brand-300);
 transform: translateY(-1px);
 box-shadow: var(--shadow-md);
 }
 .pack.is-selected {
 border-color: var(--accent);
 background: var(--accent-soft);
 }
 .pack.is-selected::before {
 content: "";
 position: absolute;
 inset: 0;
 border-radius: var(--radius-md);
 pointer-events: none;
 box-shadow: inset 0 0 0 1px var(--accent);
 }
 .pack-thumbs {
 display: flex; gap: 1px;
 flex-shrink: 0;
 width: 36px; height: 18px;
 align-items: center;
 }
 .pack-thumbs img {
 width: 18px; height: 18px;
 object-fit: contain;
 }
 .pack-thumbs .thumb-fallback {
 font-size: 14px;
 line-height: 1;
 }
 .pack-name {
 font-size: 12px;
 font-weight: 600;
 letter-spacing: -0.01em;
 flex: 1; min-width: 0;
 overflow: hidden;
 text-overflow: ellipsis;
 white-space: nowrap;
 }
 .pack.is-selected .pack-name { color: var(--accent); }
 @media (prefers-color-scheme: dark) {
 .pack.is-selected .pack-name { color: var(--brand-300); }
 }

 .actions {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 6px;
 margin-bottom: 10px;
 }
 .actions .tm-btn {
 width: 100%;
 padding: 9px 10px;
 font-size: 12.5px;
 gap: 5px;
 }
 .actions .tm-btn svg { width: 14px; height: 14px; }

 .site-row {
 display: flex; align-items: center; justify-content: space-between;
 padding: 9px 12px;
 border-radius: var(--radius-md);
 border: 1px solid var(--border);
 background: var(--bg-elevated);
 gap: 8px;
 margin-bottom: 10px;
 font-size: 12.5px;
 }
 .site-row .site-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
 .site-row .site-host {
 font-weight: 600;
 overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
 max-width: 200px;
 }
 .site-row .site-sub {
 font-size: 10.5px;
 color: var(--muted);
 }

 footer {
 display: flex; align-items: center; justify-content: space-between;
 padding-top: 10px;
 border-top: 1px solid var(--border);
 font-size: 11px;
 color: var(--muted);
 }
 footer .lang-toggle {
 background: none; border: none; padding: 4px 8px;
 color: var(--accent); font-weight: 700; font-size: 12px;
 cursor: pointer; border-radius: var(--radius-sm);
 font-family: inherit;
 }
 footer .lang-toggle:hover { background: var(--accent-soft); }
 footer a { color: var(--muted); text-decoration: none; }
 footer a:hover { color: var(--accent); }

 .pack-thumbs.is-loading {
 background: linear-gradient(90deg, var(--border) 0%, var(--surface-2) 50%, var(--border) 100%);
 background-size: 200% 100%;
 animation: shimmer 1.4s infinite;
 border-radius: 6px;
 }
 @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
 </style>
</head>

<body>
 <div class="wrap">
 <header>
 <div class="brand">
 <div class="brand-logo">
 <img src="icons/icon_128x128.png" alt="">
 </div>
 <div class="brand-text">
 <h1 data-i18n="title">TrueMoji</h1>
 <div class="ver" data-i18n="versionPill">v2.0</div>
 </div>
 </div>
 <div class="head-actions">
 <button class="tm-btn tm-btn-ghost tm-btn-icon" id="openPickerBtn" data-i18n-title="pickerOpenBtn" title="Open picker" aria-label="Open emoji picker">
 <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
 <circle cx="12" cy="12" r="9"></circle>
 <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
 <line x1="9" y1="9" x2="9.01" y2="9"></line>
 <line x1="15" y1="9" x2="15.01" y2="9"></line>
 </svg>
 </button>
 <button class="tm-btn tm-btn-ghost tm-btn-icon" id="openOptionsBtn" data-i18n-title="optionsLink" title="Options" aria-label="Open settings">
 <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
 <circle cx="12" cy="12" r="3"></circle>
 <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
 </svg>
 </button>
 </div>
 </header>

 <div class="master" id="masterCard">
 <div>
 <div class="master-title" data-i18n="enableLabel">Enable TrueMoji</div>
 <div class="master-sub" id="masterSub" data-i18n="enableHint">Master switch for all emoji replacement.</div>
 </div>
 <label class="tm-switch">
 <input type="checkbox" id="enabled">
 <span class="slider"></span>
 </label>
 </div>

 <div class="preview-card" id="previewCard">
 <div class="preview-head">
 <span class="preview-label" data-i18n="livePreviewLabel">Live preview</span>
 <span class="preview-pack-pill" id="previewPackPill">Apple</span>
 </div>
 <div class="preview-text" id="previewText" data-i18n="sampleSentence">Hi 👋 click any pack to see the difference 🔥 ✨ 😎</div>
 </div>

 <div class="pack-section">
 <div class="pack-section-head">
 <span class="pack-section-title" data-i18n="setLabel">Image set</span>
 <span class="pack-count" id="packCount"></span>
 </div>
 <div class="packs" id="packGrid"></div>
 </div>

 <div class="site-row" id="siteRow" style="display:none;">
 <div class="site-info">
 <div class="site-host" id="siteHost"></div>
 <div class="site-sub" data-i18n="excludeSite">Disable on this site</div>
 </div>
 <label class="tm-switch">
 <input type="checkbox" id="excludeSite">
 <span class="slider"></span>
 </label>
 </div>

 <div class="actions">
 <button class="tm-btn" id="openPickerBtn2">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
 <circle cx="12" cy="12" r="10"></circle>
 <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
 <line x1="9" y1="9" x2="9.01" y2="9"></line>
 <line x1="15" y1="9" x2="15.01" y2="9"></line>
 </svg>
 <span data-i18n="pickerOpenBtn">Open picker</span>
 </button>
 <button class="tm-btn tm-btn-primary" id="supportBtn">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
 <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
 </svg>
 <span data-i18n="supportProject">Support Project</span>
 </button>
 </div>

 <footer>
 <button class="lang-toggle" id="langToggle">AR</button>
 <a id="rateLink" href="https://chromewebstore.google.com/detail/truemoji/elcfpmpgobljibnhecmkmpgdmljdfbbg/reviews" target="_blank" data-i18n="rateExtension">Rate on Chrome Web Store</a>
 </footer>
 </div>

 <script src="i18n.js"></script>
 <script src="packs.js"></script>
 <script src="popup.js"></script>
</body>

</html>
