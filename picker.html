<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>TrueMoji Picker</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    body { background: var(--bg); }
    .picker-page {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 22px 80px;
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
      gap: 14px;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-logo {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: var(--gradient-sun);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-glow);
    }
    .brand-logo img { width: 32px; height: 32px; }
    .brand h1 {
      margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.02em;
    }
    .brand .sub { color: var(--muted); font-size: 12.5px; }

    .search-wrap {
      position: sticky; top: 0;
      background: var(--bg);
      padding: 10px 0 14px;
      z-index: 10;
      border-bottom: 1px solid transparent;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .search-wrap.is-stuck { border-color: var(--border); box-shadow: 0 8px 16px -10px rgba(0,0,0,0.08); }
    .search-input-wrap {
      position: relative;
    }
    .search-input-wrap svg {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: 14px;
      width: 18px; height: 18px;
      color: var(--muted);
      pointer-events: none;
    }
    html[dir="rtl"] .search-input-wrap svg { left: auto; right: 14px; }
    .search-input {
      width: 100%;
      padding: 12px 14px 12px 44px;
      border-radius: var(--radius-pill);
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--fg);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    html[dir="rtl"] .search-input { padding: 12px 44px 12px 14px; }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .cat-tabs {
      display: flex;
      gap: 4px;
      margin-top: 14px;
      overflow-x: auto;
      scrollbar-width: thin;
    }
    .cat-tabs::-webkit-scrollbar { height: 4px; }
    .cat-tabs::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
    .cat-tab {
      padding: 7px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--fg);
      cursor: pointer;
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .cat-tab:hover { border-color: var(--accent); }
    .cat-tab.is-active {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
    }
    .cat-tab .icon { margin-inline-end: 4px; font-size: 14px; }

    .pack-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px 5px 6px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: var(--radius-pill);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .pack-chip select {
      border: none;
      background: transparent;
      color: inherit;
      font-weight: 700;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      padding: 2px 4px;
      outline: none;
    }
    .pack-chip select option { color: var(--fg); background: var(--card); }

    .section { margin-top: 24px; }
    .section h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 10px;
      font-weight: 800;
      display: flex; align-items: center; gap: 8px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
      gap: 4px;
    }
    .cell {
      position: relative;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.12s, transform 0.1s;
      background: transparent;
      border: none;
      padding: 0;
      font-family: inherit;
    }
    .cell:hover { background: var(--accent-soft); transform: scale(1.08); }
    .cell:active { transform: scale(0.95); }
    .cell img {
      width: 28px; height: 28px;
      object-fit: contain;
      pointer-events: none;
    }
    .cell .star {
      position: absolute;
      top: 2px; right: 2px;
      width: 14px; height: 14px;
      opacity: 0;
      transition: opacity 0.15s;
      color: var(--muted);
    }
    html[dir="rtl"] .cell .star { right: auto; left: 2px; }
    .cell:hover .star { opacity: 0.7; }
    .cell .star.is-on { opacity: 1; color: var(--accent); }
    .cell .star:hover { opacity: 1; color: var(--accent); }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    .empty-state .em { font-size: 36px; display: block; margin-bottom: 8px; opacity: 0.6; }

    .skeleton .cell {
      background: var(--surface-2);
      animation: tm-pulse 1.4s ease-in-out infinite;
    }
    @keyframes tm-pulse {
      0%, 100% { opacity: 0.5; }
      50%      { opacity: 1; }
    }

    .head-actions { display: flex; gap: 8px; align-items: center; }
  </style>
</head>

<body>
  <div class="picker-page">

    <header>
      <div class="brand">
        <div class="brand-logo"><img src="icons/icon_128x128.png" alt=""></div>
        <div>
          <h1 data-i18n="pickerTitle">Emoji Picker</h1>
          <div class="sub" data-i18n="pickerHint">Click any emoji to copy it.</div>
        </div>
      </div>
      <div class="head-actions">
        <span class="pack-chip">
          <span data-i18n="setLabel">Image set</span>:
          <select id="packSelect"></select>
        </span>
        <button class="tm-btn tm-btn-ghost tm-btn-icon" id="closeBtn" aria-label="Close" title="Close">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
    </header>

    <div class="search-wrap" id="searchWrap">
      <div class="search-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="searchInput" class="search-input" data-i18n-placeholder="pickerSearchPlaceholder" placeholder="Search emojis…">
      </div>
      <div class="cat-tabs" id="catTabs"></div>
    </div>

    <div id="results"></div>
  </div>

  <div class="tm-toast" id="toast"></div>

  <script src="i18n.js"></script>
  <script src="packs.js"></script>
  <script src="picker.js"></script>
</body>

</html>
